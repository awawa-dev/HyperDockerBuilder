name: HyperHdr Docker Builder

on:
  push:

jobs:
  DevelopmentDockerBuilder:
    name: ${{ matrix.architecture }}/${{ matrix.distroName }}:${{ matrix.distroVersion }}
    runs-on: ${{ startsWith(matrix.architecture, 'arm') && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    permissions:
      packages: write

    strategy:
      matrix:
        distroName: [debian]
        distroVersion: [bullseye, bookworm, trixie]
        architecture: [amd64, armhf, arm64]        
        include:
          - distroName: ubuntu
            distroVersion: noble
            architecture: amd64
          - distroName: ubuntu
            distroVersion: resolute
            architecture: amd64
          - distroName: fedora
            distroVersion: 44
            architecture: amd64
          - distroName: archlinux
            distroVersion: latest
            architecture: amd64         

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3.7.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
     
      - name: Prepare docker source
        shell: bash
        run: |
          # DOCKER SOURCE
          if [ "${{ matrix.architecture }}" = "arm64" ] && [ "${{ matrix.distroVersion }}" = "trixie" ]; then
            echo "FINAL_DOCKER_SOURCE=arm64v8/debian:${{ matrix.distroVersion }}-slim" >> $GITHUB_ENV ## moderm Rpi OS (arm64) ##
          elif [ "${{ matrix.architecture }}" = "armhf" ] && [ "${{ matrix.distroVersion }}" = "trixie" ]; then
            echo "FINAL_DOCKER_SOURCE=arm32v7/debian:${{ matrix.distroVersion }}-slim" >> $GITHUB_ENV ## moderm Rpi OS (armhf) ##
          elif [ "${{ matrix.architecture }}" = "arm64" ]; then
            echo "FINAL_DOCKER_SOURCE=balenalib/raspberrypi3-64:${{ matrix.distroVersion }}" >> $GITHUB_ENV ## older Rpi OS (arm64) ##
          elif [ "${{ matrix.architecture }}" = "armhf" ]; then
            echo "FINAL_DOCKER_SOURCE=balenalib/raspberry-pi:${{ matrix.distroVersion }}" >> $GITHUB_ENV ## older Rpi OS (armhf) ##
          else
            echo "FINAL_DOCKER_SOURCE=${{ matrix.distroName }}:${{ matrix.distroVersion }}" >> $GITHUB_ENV ## DEFAULT ##
          fi
          # TOOLKIT
          if [ "${{ matrix.distroName }}" = "fedora" ]; then
            echo "DOCKER_TOOL=buildFedora" >> $GITHUB_ENV
          elif [ "${{ matrix.distroName }}" = "archlinux" ]; then
            echo "DOCKER_TOOL=buildArch" >> $GITHUB_ENV
          else
            echo "DOCKER_TOOL=buildDebian" >> $GITHUB_ENV
          fi

      - name: Build & push docker container
        env:
          HYPERHDR_DOCKER_TAG: ghcr.io/awawa-dev/${{ matrix.architecture }}/${{ matrix.distroName }}:${{ matrix.distroVersion }}
        run: |
          docker build \
          -t ${{ env.HYPERHDR_DOCKER_TAG }} \
          --platform linux/${{ matrix.architecture }} \
          --label maintainer="HyperHDR" \
          --label org.opencontainers.image.title="${{ matrix.distroName }} (${{ matrix.distroVersion }})" \
          --label org.opencontainers.image.description="HyperHDR build environment" \
          --label org.opencontainers.image.url="https://hyperhdr.eu" \
          --label org.opencontainers.image.source="${{ github.server_url }}/${{ github.repository }}" \
          --label org.opencontainers.image.vendor="HyperHDR" \
          --label org.opencontainers.image.licenses="MIT" \
          --build-arg DOCKER_SOURCE="${{ env.FINAL_DOCKER_SOURCE }}" \
          -f ${{ env.DOCKER_TOOL }} .

      - name: Push docker container
        if: github.ref == 'refs/heads/master'
        env:
          HYPERHDR_DOCKER_TAG: ghcr.io/awawa-dev/${{ matrix.architecture }}/${{ matrix.distroName }}:${{ matrix.distroVersion }}
        run: |
          docker push ${{ env.HYPERHDR_DOCKER_TAG }}